<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一天礼貌大冒险</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fff8f0;--peach:#ffb899;--blush:#ffcfb3;
  --lavender:#e8d5f5;--purple:#9b72cf;--dpurple:#6b3fa0;
  --mint:#c8f0e0;--green:#5cb88a;--sky:#d0eeff;--blue:#6aaed6;
  --yellow:#fff3b0;--gold:#f5c842;--coral:#ff8c7a;
  --text:#3d2a1e;--subtext:#7a5c4a;
}
body{
  font-family:'Ma Shan Zheng','ZCOOL XiaoWei',serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
}
#app{
  width:100%;max-width:680px;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(155,114,207,0.25),0 4px 16px rgba(0,0,0,0.08);
  background:#fff;
}

/* ══ INTRO ══════════════════════════════════════════ */
#intro{
  min-height:580px;
  background:linear-gradient(160deg,#fff0fa 0%,#ffe8f5 30%,#e8d5f5 60%,#d0eeff 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2.5rem 2rem;gap:1.4rem;position:relative;overflow:hidden;
}
.intro-deco{position:absolute;opacity:.18;font-size:80px;pointer-events:none}
.intro-deco.d1{top:-10px;left:-10px;transform:rotate(-20deg)}
.intro-deco.d2{bottom:20px;right:-10px;transform:rotate(15deg);font-size:60px}
.intro-deco.d3{top:30%;left:5%;font-size:40px}
.intro-deco.d4{top:20%;right:8%;font-size:36px}
.intro-mascot{width:140px;height:140px;filter:drop-shadow(0 8px 16px rgba(155,114,207,.3))}
.intro-title{
  font-size:34px;color:var(--dpurple);text-align:center;
  line-height:1.3;text-shadow:2px 3px 0 rgba(155,114,207,.2);
}
.intro-subtitle{
  font-size:15px;color:var(--subtext);text-align:center;
  background:rgba(255,255,255,.7);border-radius:16px;
  padding:.6rem 1.2rem;border:1.5px solid rgba(155,114,207,.2);
  line-height:1.7;max-width:300px;
}
.magic-word{
  display:inline-block;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:#fff;border-radius:20px;padding:.2rem .9rem;
  font-size:17px;margin:.2rem 0;
}
.name-section{display:flex;flex-direction:column;align-items:center;gap:.6rem}
.name-label{font-size:16px;color:var(--subtext)}
.name-inp{
  font-family:inherit;font-size:18px;
  padding:.55rem 1.2rem;border-radius:30px;
  border:2px solid var(--lavender);outline:none;
  background:#fff;color:var(--text);
  width:180px;text-align:center;
  transition:border-color .2s;
}
.name-inp:focus{border-color:var(--purple)}
.name-inp::placeholder{color:#c4b5d4;font-size:15px}
.start-btn{
  font-family:inherit;font-size:19px;
  padding:.7rem 2.5rem;border-radius:50px;
  border:none;
  background:linear-gradient(135deg,#b47fd4,#7ab8e8);
  color:#fff;cursor:pointer;
  box-shadow:0 6px 20px rgba(155,114,207,.4),0 2px 6px rgba(0,0,0,.1);
  transition:transform .15s,box-shadow .15s;letter-spacing:.5px;
}
.start-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 10px 28px rgba(155,114,207,.5)}
.start-btn:active{transform:scale(.97)}

/* ══ GAME ════════════════════════════════════════════ */
#game{display:none;flex-direction:column}

/* progress */
#topbar{
  display:flex;align-items:center;gap:.6rem;
  padding:.7rem 1.2rem;
  background:linear-gradient(90deg,#f3e8ff,#e0f0ff);
  border-bottom:1.5px solid rgba(155,114,207,.15);
}
.scene-tag{
  font-size:13px;color:var(--dpurple);
  background:rgba(155,114,207,.12);
  border-radius:12px;padding:.2rem .8rem;
  border:1px solid rgba(155,114,207,.2);
}
.prog-dots{display:flex;gap:5px;margin-left:auto}
.pdot{
  width:12px;height:12px;border-radius:50%;
  background:#ddd;transition:all .3s;
}
.pdot.done{background:var(--green)}
.pdot.active{background:var(--purple);box-shadow:0 0 0 3px rgba(155,114,207,.3)}

/* scene bg */
#scenewrap{position:relative;width:100%;height:310px;overflow:hidden;flex-shrink:0}
#scenesvg{width:100%;height:100%}
/* character - positioned right side like otome game */
#charwrap{
  position:absolute;bottom:0;right:12%;
  width:200px;height:290px;
  transition:opacity .5s,transform .5s;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.12));
}
#charsvg{width:200px;height:290px}

/* dialog */
#dialogwrap{
  position:relative;
  background:linear-gradient(160deg,rgba(255,250,240,.97),rgba(255,240,255,.97));
  border-top:2.5px solid rgba(155,114,207,.2);
  padding:1rem 1.2rem 1rem;
  min-height:100px;
}
#npcnamebadge{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:16px;font-weight:bold;color:var(--dpurple);
  background:linear-gradient(135deg,#ede8ff,#dff0ff);
  border-radius:20px;padding:.25rem 1rem;margin-bottom:.5rem;
  border:1.5px solid rgba(155,114,207,.25);
  box-shadow:0 2px 8px rgba(155,114,207,.15);
}
#dialogtext{
  font-size:17px;color:var(--text);line-height:1.8;min-height:52px;
}
#speakbtn{
  position:absolute;top:.8rem;right:1rem;
  background:linear-gradient(135deg,#e8d5f5,#d0eeff);
  border:1.5px solid rgba(155,114,207,.3);
  border-radius:50%;width:36px;height:36px;
  cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.08);
}
#speakbtn:hover{transform:scale(1.1);background:linear-gradient(135deg,#d8c5f5,#b8d8ff)}
#speakbtn.speaking{animation:speakpulse .8s infinite}
@keyframes speakpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}

/* choices */
#choicewrap{
  padding:.8rem 1.2rem;
  background:linear-gradient(160deg,#f9f5ff,#f0f8ff);
  border-top:1.5px solid rgba(155,114,207,.12);
  display:none;flex-direction:column;gap:.5rem;
}
.choice-label{font-size:13px;color:var(--subtext);margin-bottom:.1rem}
.cbtn{
  font-family:inherit;font-size:15px;
  text-align:left;padding:.65rem 1rem .65rem 1.2rem;
  border-radius:14px;border:2px solid rgba(155,114,207,.2);
  background:#fff;color:var(--text);cursor:pointer;
  transition:all .18s;line-height:1.5;
  position:relative;overflow:hidden;
}
.cbtn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;background:linear-gradient(180deg,var(--purple),var(--blue));
  opacity:0;transition:opacity .2s;
}
.cbtn:hover{
  background:linear-gradient(135deg,#f3ecff,#ebf5ff);
  border-color:rgba(155,114,207,.45);transform:translateX(3px);
}
.cbtn:hover::before{opacity:1}
.cbtn.correct{background:#edfff5;border-color:#5cb88a;color:#2d6b4a}
.cbtn.correct::before{opacity:1;background:var(--green)}
.cbtn.wrong{background:#fff0ee;border-color:#ff8c7a;color:#8b2a1a}
.cbtn.wrong::before{opacity:1;background:var(--coral)}

/* voice input */
#voicewrap{
  padding:.5rem 1.2rem .9rem;
  background:linear-gradient(160deg,#f9f5ff,#f0f8ff);
  display:none;
}
#voicewrap .voice-row{display:flex;gap:.5rem;align-items:center}
#voiceinp{
  font-family:inherit;font-size:15px;flex:1;
  padding:.55rem .9rem;border-radius:12px;
  border:1.5px solid rgba(155,114,207,.3);
  background:#fff;color:var(--text);outline:none;
  transition:border-color .2s;
}
#voiceinp:focus{border-color:var(--purple)}
#micbtn{
  background:linear-gradient(135deg,#e8d5f5,#d0eeff);
  border:1.5px solid rgba(155,114,207,.3);
  border-radius:50%;width:40px;height:40px;font-size:20px;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
#micbtn:hover{transform:scale(1.08)}
#micbtn.listening{background:linear-gradient(135deg,#ffd5d0,#ffb3aa);animation:speakpulse .8s infinite}
#micstatus{font-size:12px;color:var(--subtext);margin-top:.3rem;min-height:16px}
#submbtn{
  font-family:inherit;font-size:14px;
  padding:.45rem 1rem;border-radius:10px;
  border:1.5px solid var(--purple);
  background:linear-gradient(135deg,#ede8ff,#dff0ff);
  color:var(--dpurple);cursor:pointer;
  transition:all .18s;
}
#submbtn:hover{background:linear-gradient(135deg,#d8c5f5,#c8e4ff)}

/* feedback */
#feedbackwrap{
  padding:.9rem 1.2rem;
  display:none;font-size:15px;line-height:1.7;
}
#feedbackwrap.success{
  background:linear-gradient(135deg,#edfff5,#e0fff0);
  color:#1d6640;border-top:2px solid #5cb88a;
}
#feedbackwrap.fail{
  background:linear-gradient(135deg,#fffbec,#fff8e0);
  color:#7a4a00;border-top:2px solid var(--gold);
}
.feedback-icon{font-size:20px;margin-right:.4rem}

/* next button */
#nextbtn{
  font-family:inherit;font-size:16px;
  padding:.6rem 1.8rem;border-radius:30px;
  border:none;
  background:linear-gradient(135deg,#b47fd4,#7ab8e8);
  color:#fff;cursor:pointer;margin:.6rem 1.2rem .9rem;
  box-shadow:0 4px 14px rgba(155,114,207,.35);
  transition:all .18s;display:none;align-self:flex-start;
  letter-spacing:.3px;
}
#nextbtn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(155,114,207,.45)}

/* ══ SUMMARY ═══════════════════════════════════════ */
#summary{
  display:none;flex-direction:column;align-items:center;
  padding:2.5rem 1.5rem;gap:1.2rem;
  background:linear-gradient(160deg,#fff0fa,#ffe8f5 30%,#e8d5f5 60%,#d0eeff 100%);
  min-height:480px;
}
.sum-title{font-size:28px;color:var(--dpurple);text-align:center}
.sum-cards{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:340px}
.sum-card{
  display:flex;align-items:center;gap:.8rem;
  background:rgba(255,255,255,.8);border-radius:16px;
  padding:.75rem 1.2rem;font-size:16px;color:var(--text);
  border:1.5px solid rgba(155,114,207,.2);
  box-shadow:0 3px 10px rgba(155,114,207,.1);
}
.sum-check{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#5cb88a,#3da870);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:16px;flex-shrink:0;
}
.sum-msg{
  font-size:15px;color:var(--subtext);text-align:center;
  background:rgba(255,255,255,.7);border-radius:16px;
  padding:.8rem 1.3rem;max-width:310px;line-height:1.8;
  border:1.5px solid rgba(155,114,207,.15);
}
.restart-btn{
  font-family:inherit;font-size:17px;
  padding:.65rem 2.2rem;border-radius:40px;border:none;
  background:linear-gradient(135deg,#b47fd4,#7ab8e8);
  color:#fff;cursor:pointer;margin-top:.3rem;
  box-shadow:0 6px 18px rgba(155,114,207,.35);
  transition:all .18s;
}
.restart-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div id="app">

<!-- ══ INTRO ══ -->
<div id="intro">
  <div class="intro-deco d1">🌸</div>
  <div class="intro-deco d2">⭐</div>
  <div class="intro-deco d3">🌿</div>
  <div class="intro-deco d4">🦋</div>
  <!-- Mascot character SVG -->
  <svg class="intro-mascot" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
    <!-- body -->
    <ellipse cx="70" cy="105" rx="32" ry="28" fill="#ffd0e8"/>
    <!-- dress detail -->
    <ellipse cx="70" cy="108" rx="28" ry="22" fill="#f9b8d8"/>
    <!-- collar bow -->
    <ellipse cx="60" cy="83" rx="8" ry="5" fill="#ff99cc" transform="rotate(-30,60,83)"/>
    <ellipse cx="80" cy="83" rx="8" ry="5" fill="#ff99cc" transform="rotate(30,80,83)"/>
    <circle cx="70" cy="82" r="5" fill="#ff99cc"/>
    <!-- arms -->
    <ellipse cx="38" cy="100" rx="10" ry="17" fill="#ffe0f0" transform="rotate(15,38,100)"/>
    <ellipse cx="102" cy="100" rx="10" ry="17" fill="#ffe0f0" transform="rotate(-15,102,100)"/>
    <!-- legs -->
    <rect x="54" y="128" width="14" height="10" rx="5" fill="#ffe0f0"/>
    <rect x="72" y="128" width="14" height="10" rx="5" fill="#ffe0f0"/>
    <!-- shoes -->
    <ellipse cx="61" cy="138" rx="10" ry="5" fill="#c084e8"/>
    <ellipse cx="79" cy="138" rx="10" ry="5" fill="#c084e8"/>
    <!-- neck -->
    <rect x="62" y="72" width="16" height="14" rx="5" fill="#ffe8cc"/>
    <!-- head -->
    <ellipse cx="70" cy="52" rx="36" ry="34" fill="#ffe8cc"/>
    <!-- hair back -->
    <ellipse cx="70" cy="30" rx="36" ry="22" fill="#c084e8"/>
    <!-- hair sides -->
    <ellipse cx="36" cy="55" rx="12" ry="20" fill="#c084e8"/>
    <ellipse cx="104" cy="55" rx="12" ry="20" fill="#c084e8"/>
    <!-- hair front -->
    <path d="M40,38 Q55,20 70,22 Q85,20 100,38" fill="#c084e8"/>
    <!-- bangs -->
    <path d="M42,42 Q50,30 60,34" fill="#b070d8"/>
    <path d="M98,42 Q90,30 80,34" fill="#b070d8"/>
    <!-- hair ribbon -->
    <ellipse cx="92" cy="28" rx="10" ry="6" fill="#ff99cc" transform="rotate(20,92,28)"/>
    <ellipse cx="106" cy="24" rx="10" ry="6" fill="#ff99cc" transform="rotate(-15,106,24)"/>
    <circle cx="99" cy="26" r="5" fill="#ffbbdd"/>
    <!-- eyes -->
    <ellipse cx="58" cy="52" rx="8" ry="9" fill="#fff"/>
    <ellipse cx="82" cy="52" rx="8" ry="9" fill="#fff"/>
    <ellipse cx="58" cy="54" rx="5.5" ry="6.5" fill="#7040c0"/>
    <ellipse cx="82" cy="54" rx="5.5" ry="6.5" fill="#7040c0"/>
    <ellipse cx="58" cy="53" rx="3" ry="3.5" fill="#4a2890"/>
    <ellipse cx="82" cy="53" rx="3" ry="3.5" fill="#4a2890"/>
    <circle cx="60" cy="50" r="2" fill="#fff"/>
    <circle cx="84" cy="50" r="2" fill="#fff"/>
    <!-- eyelashes -->
    <path d="M50,46 Q53,42 56,44" stroke="#7040c0" stroke-width="1.5" fill="none"/>
    <path d="M90,46 Q87,42 84,44" stroke="#7040c0" stroke-width="1.5" fill="none"/>
    <!-- blush -->
    <ellipse cx="46" cy="61" rx="9" ry="5" fill="#ffb3c8" opacity=".55"/>
    <ellipse cx="94" cy="61" rx="9" ry="5" fill="#ffb3c8" opacity=".55"/>
    <!-- nose -->
    <ellipse cx="70" cy="62" rx="3" ry="2" fill="#f5a88a" opacity=".6"/>
    <!-- mouth happy -->
    <path d="M61,70 Q70,78 79,70" stroke="#d4607a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- stars decoration -->
    <text x="15" y="28" font-size="14" fill="#ffd700" opacity=".8">✦</text>
    <text x="110" y="20" font-size="10" fill="#ffd700" opacity=".7">✦</text>
  </svg>

  <div class="intro-title">✨ 一天礼貌大冒险 ✨</div>
  <div class="intro-subtitle">
    学会魔法语言<br>
    <span class="magic-word">「请……好吗？」</span><br>
    顺利度过美好的一天！
  </div>
  <div class="name-section">
    <div class="name-label">👋 你叫什么名字呀？</div>
    <input class="name-inp" id="nameinp" placeholder="输入你的名字" maxlength="6">
  </div>
  <button class="start-btn" id="startbtn">出发冒险！🌟</button>
</div>

<!-- ══ GAME ══ -->
<div id="game">
  <div id="topbar">
    <span class="scene-tag" id="scenetag">🏠 场景一</span>
    <div class="prog-dots">
      <div class="pdot active" id="pd0"></div>
      <div class="pdot" id="pd1"></div>
      <div class="pdot" id="pd2"></div>
    </div>
  </div>

  <div id="scenewrap">
    <svg id="scenesvg" viewBox="0 0 680 310" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="charwrap">
      <svg id="charsvg" viewBox="0 0 200 290" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div id="dialogwrap">
    <div id="npcnamebadge">🌸 旁白</div>
    <div id="dialogtext"></div>
    <button id="speakbtn" title="朗读这段话">🔊</button>
  </div>

  <div id="feedbackwrap"></div>

  <div id="choicewrap">
    <div class="choice-label">💬 你会怎么说？选一个吧：</div>
    <button class="cbtn" id="cb0"></button>
    <button class="cbtn" id="cb1"></button>
    <button class="cbtn" id="cb2"></button>
  </div>

  <div id="voicewrap">
    <div class="voice-row">
      <input id="voiceinp" placeholder="🎤 也可以说出来，或者打字...">
      <button id="micbtn" title="点击说话">🎙</button>
      <button id="submbtn">提交</button>
    </div>
    <div id="micstatus">点击 🎙 让孩子说出礼貌的话</div>
  </div>

  <button id="nextbtn"></button>
</div>

<!-- ══ SUMMARY ══ -->
<div id="summary">
  <div style="font-size:48px">🎊</div>
  <div class="sum-title">礼貌大冒险完成！</div>
  <div class="sum-cards" id="sumcards"></div>
  <div class="sum-msg">
    记住魔法语言：<br>
    <strong>「请……好吗？」</strong><br>
    让每一天都充满善意和温暖～ 🌸
  </div>
  <button class="restart-btn" id="restartbtn">✨ 再玩一次</button>
</div>

</div><!-- #app -->

<script>
// ═══════════════════════════════════════════════════
//  SCENE BACKGROUNDS (detailed SVG illustrations)
// ═══════════════════════════════════════════════════

home: `

<!-- WINDOW left -->
<rect x="40" y="28" width="150" height="165" rx="10" fill="#c8eeff" stroke="#d4aa60" stroke-width="3"/>

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let G = {
  name:'小言', sceneIdx:0, stepIdx:0,
  tries:0, recognition:null, voiceOk:false, listening:false,
  currentText:''
};

// ═══════════════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════════════
function initSpeech(){
  G.voiceOk = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  // 预加载声音列表，浏览器需要时间初始化
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = ()=> window.speechSynthesis.getVoices();
  }
}

function getBestVoice(){
  const voices = window.speechSynthesis.getVoices();
  // 优先级：晓晓 > 其他微软中文 > 任何zh-CN > 任何zh
  const priority = [
    v => v.name.includes('Xiaoxiao') || v.name.includes('晓晓'),
    v => v.name.includes('Microsoft') && v.lang.startsWith('zh'),
    v => v.lang === 'zh-CN',
    v => v.lang.startsWith('zh'),
  ];
  for(const test of priority){
    const found = voices.find(test);
    if(found) return found;
  }
  return null;
}

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\$NAME/g, G.name));
  u.lang='zh-CN'; u.rate=0.85; u.pitch=1.05;
  const voice = getBestVoice();
  if(voice) u.voice = voice;
  const btn = document.getElementById('speakbtn');
  u.onstart = ()=>{ if(btn) btn.className='speaking'; };
  u.onend = ()=>{ if(btn) btn.className=''; };
  window.speechSynthesis.speak(u);
}

function typeText(el, text, cb){
  const t = text.replace(/\$NAME/g, G.name);
  G.currentText = t;
  el.textContent = '';
  let i = 0;
  const iv = setInterval(()=>{
    el.textContent += t[i++];
    if(i >= t.length){ clearInterval(iv); if(cb) setTimeout(cb, 200); }
  }, 38);
}

// ═══════════════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════════════
function updateProgress(){
  [0,1,2].forEach(i=>{
    const d = document.getElementById('pd'+i);
    d.className = 'pdot' + (i<G.sceneIdx?' done': i===G.sceneIdx?' active':'');
  });
}

function setChar(type, mood){
  document.getElementById('charsvg').innerHTML = CHARS[type](mood);
}

function showScene(){
  const sc = SCENES[G.sceneIdx];
  document.getElementById('scenetag').textContent = sc.tag;
  document.getElementById('scenesvg').innerHTML = BACKGROUNDS[sc.bg];
  setChar(sc.npcType, 'neutral');
  updateProgress();
  G.stepIdx = 0;
  G.tries = 0;
  showStep();
}

const SPEAKER_ICONS = {
  '旁白':'📖','妈妈':'👩','王老师':'👩‍🏫','小杰':'👦'
};
function speakerIcon(name){ return SPEAKER_ICONS[name]||'💭'; }

function showStep(){
  const sc = SCENES[G.sceneIdx];
  const step = sc.steps[G.stepIdx];
  hide('choicewrap'); hide('voicewrap'); hide('feedbackwrap'); hide('nextbtn');

  const badge = document.getElementById('npcnamebadge');
  const speaker = step.speaker.replace(/\$NAME/g, G.name);
  badge.textContent = (step.icon||speakerIcon(step.speaker)) + ' ' + speaker;
  badge.style.background = step.speaker.includes('心想')
    ? 'linear-gradient(135deg,#fff9c7,#fffacd)'
    : step.speaker==='旁白'
      ? 'linear-gradient(135deg,#f3f4f6,#e5e7eb)'
      : 'linear-gradient(135deg,#ede8ff,#dff0ff)';
  badge.style.color = step.speaker.includes('心想') ? '#92400e'
    : step.speaker==='旁白' ? '#374151' : 'var(--dpurple)';

  const dt = document.getElementById('dialogtext');
  typeText(dt, step.text, ()=>{
    speak(step.text);
    const nb = document.getElementById('nextbtn');
    nb.style.display = 'inline-block';
    const isLast = G.stepIdx >= sc.steps.length-1;
    nb.textContent = isLast ? '做出选择 ✨' : '继续 ▶';
    nb.onclick = ()=>{
      if(isLast) showChoices();
      else { G.stepIdx++; showStep(); }
    };
  });
}

function showChoices(){
  const sc = SCENES[G.sceneIdx];
  hide('nextbtn');
  document.getElementById('npcnamebadge').textContent = '💬 你会怎么说？';
  document.getElementById('npcnamebadge').style.background = 'linear-gradient(135deg,#fef3c7,#fde68a)';
  document.getElementById('npcnamebadge').style.color = '#92400e';
  document.getElementById('dialogtext').textContent = sc.task;

  const cw = document.getElementById('choicewrap');
  cw.style.display = 'flex';
  sc.options.forEach((o,i)=>{
    const b = document.getElementById('cb'+i);
    b.textContent = o.text;
    b.className = 'cbtn';
    b.disabled = false;
    b.onclick = ()=> handleChoice(i);
  });
  show('voicewrap');
  document.getElementById('voiceinp').value = '';
  document.getElementById('micstatus').textContent = G.voiceOk
    ? '点击 🎙 让孩子说出礼貌的话，或直接打字' : '（请在文本框输入回答）';
}

function checkAnswer(text){
  const t = text.trim();
  return t.includes('请') && t.includes('好吗') && t.length > 4;
}

function handleChoice(i){
  const sc = SCENES[G.sceneIdx];
  const o = sc.options[i];
  document.querySelectorAll('.cbtn').forEach(b=>{ b.disabled=true; b.onclick=null; });
  document.getElementById('cb'+i).className = 'cbtn ' + (o.correct?'correct':'wrong');
  if(o.correct) doSuccess();
  else { G.tries++; doFail(o.hint); }
}

function handleFreeInput(text){
  if(!text.trim()) return;
  const sc = SCENES[G.sceneIdx];
  if(checkAnswer(text)){
    doSuccess();
  } else {
    G.tries++;
    let hint='';
    const hasPls=text.includes('请'), hasHm=text.includes('好吗');
    if(!hasPls&&!hasHm) hint='好像少了"请"和"好吗"这两个礼貌词哦！';
    else if(!hasPls) hint='好像少了"请"字。加上它，让请求更有礼貌～';
    else hint='结尾要加上"好吗"，这是礼貌请求的关键词哦！';
    if(G.tries>=3) hint += ' 来跟着说：「请……好吗？」👆';
    const npcName = sc.id==='home' ? '妈妈' : sc.id==='class' ? '王老师' : '小杰';
    doFail(npcName + '说："' + hint + '"');
  }
}

function doFail(msg){
  const sc = SCENES[G.sceneIdx];
  setChar(sc.npcType, 'sad');
  hide('voicewrap');
  const fb = document.getElementById('feedbackwrap');
  fb.className = 'fail';
  fb.innerHTML = '<span class="feedback-icon">⚠️</span>' + msg;
  fb.style.display = 'block';
  speak(msg);
  const nb = document.getElementById('nextbtn');
  nb.style.display = 'inline-block';
  nb.textContent = '← 再试一次';
  nb.style.background = 'linear-gradient(135deg,#d97706,#f59e0b)';
  nb.onclick = ()=>{
    fb.style.display='none';
    nb.style.background='';
    setChar(sc.npcType,'neutral');
    showChoices();
  };
}

function doSuccess(){
  const sc = SCENES[G.sceneIdx];
  setChar(sc.npcType, 'happy');
  hide('choicewrap'); hide('voicewrap');
  const fb = document.getElementById('feedbackwrap');
  fb.className = 'success';
  fb.innerHTML = `<span class="feedback-icon">✅</span><strong>礼貌魔法成功！</strong><br>${sc.successSpeaker}说："${sc.successMsg}"`;
  fb.style.display = 'block';
  speak(sc.successMsg);
  document.getElementById('npcnamebadge').textContent = '🌟 ' + sc.successSpeaker;

  const nb = document.getElementById('nextbtn');
  nb.style.display = 'inline-block';
  nb.style.background = '';
  nb.textContent = G.sceneIdx < SCENES.length-1 ? '进入下一个场景 ➜' : '查看成绩单 🎉';
  nb.onclick = ()=>{
    if(G.sceneIdx < SCENES.length-1){
      G.sceneIdx++;
      fb.style.display='none';
      showScene();
    } else {
      showSummary();
    }
  };
}

function showSummary(){
  document.getElementById('game').style.display = 'none';
  const sum = document.getElementById('summary');
  sum.style.display = 'flex';
  const cards = document.getElementById('sumcards');
  cards.innerHTML = '';
  SCENES.forEach(sc=>{
    const d = document.createElement('div');
    d.className = 'sum-card';
    d.innerHTML = `<div class="sum-check">✓</div><span>${sc.tag} — 通过！</span>`;
    cards.appendChild(d);
  });
}

function initRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.lang='zh-CN'; r.continuous=false; r.interimResults=false;
  r.onresult = e=>{
    const t = e.results[0][0].transcript;
    const inp=document.getElementById('voiceinp');
    const st=document.getElementById('micstatus');
    const mb=document.getElementById('micbtn');
    if(inp) inp.value = t;
    if(st) st.textContent='✅ 听到了：' + t;
    if(mb) mb.className='';
    G.listening=false;
    setTimeout(()=> handleFreeInput(t), 300);
  };
  r.onerror = e=>{
    const st=document.getElementById('micstatus');
    const mb=document.getElementById('micbtn');
    G.listening=false;
    if(mb) mb.className='';
    if(e.error==='no-speech') {
      if(st) st.textContent='没听到声音，请再试一次 🎙';
    } else if(e.error==='not-allowed'){
      if(st) st.textContent='麦克风被拒绝，请在浏览器设置里允许';
    } else {
      if(st) st.textContent='出错了(' + e.error + ')，请再试一次 🎙';
    }
  };
  r.onend = ()=>{
    G.listening=false;
    const mb=document.getElementById('micbtn');
    if(mb) mb.className='';
  };
  return r;
}

function toggleMic(){
  const mb=document.getElementById('micbtn');
  const st=document.getElementById('micstatus');
  if(G.listening && G.recognition){
    G.recognition.stop();
    G.listening=false;
    if(mb) mb.className='';
    if(st) st.textContent='已停止';
    return;
  }
  // 每次重新创建，避免状态残留
  G.recognition = initRecognition();
  if(!G.recognition){
    if(st) st.textContent='此浏览器不支持语音识别，请用Chrome';
    return;
  }
  G.listening=true;
  if(mb) mb.className='listening';
  if(st) st.textContent='🔴 正在听……请说话';
  try{
    G.recognition.start();
  } catch(e){
    G.listening=false;
    if(mb) mb.className='';
    if(st) st.textContent='启动失败，请再点一次 🎙';
  }
}

function show(id){
  const el=document.getElementById(id);
  el.style.display=(id==='choicewrap')?'flex':'block';
}
function hide(id){ document.getElementById(id).style.display='none'; }

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
initSpeech();

document.getElementById('startbtn').onclick = ()=>{
  G.name = document.getElementById('nameinp').value.trim() || '小言';
  document.getElementById('intro').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  showScene();
};
document.getElementById('nameinp').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('startbtn').click(); });

document.getElementById('speakbtn').onclick = ()=>{ speak(G.currentText); };
document.getElementById('micbtn').onclick = toggleMic;
document.getElementById('submbtn').onclick = ()=> handleFreeInput(document.getElementById('voiceinp').value);
document.getElementById('voiceinp').addEventListener('keydown', e=>{ if(e.key==='Enter') handleFreeInput(e.target.value); });
document.getElementById('restartbtn').onclick = ()=>{
  G.sceneIdx=0; G.stepIdx=0; G.tries=0;
  document.getElementById('summary').style.display='none';
  document.getElementById('feedbackwrap').style.display='none';
  document.getElementById('game').style.display='flex';
  showScene();
};
